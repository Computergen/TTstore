<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Loading TULA MARKET</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container">
      <section class="page-top">
        <h1 class="page-title">Shopping Cart</h1>
        <p class="page-copy">Review your choices, adjust quantities, and continue to checkout with confidence.</p>
      </section>
      <section class="grid grid-2 reveal">
        <article class="glass-card">
          <h3>Cart Items</h3>
          <p class="muted">1 × Signature Leather Bag • $480</p>
          <p class="muted">1 × Velvet Elixir • $140</p>
        </article>
        <article class="glass-card">
          <h3>Order Summary</h3>
          <p class="muted">Subtotal: $620</p>
          <p class="muted">Delivery: $18</p>
          <p class="price">Total: $638</p>
          <div class="hero-actions"><a class="btn btn-primary" href="checkout.html">Checkout</a></div>
        </article>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
