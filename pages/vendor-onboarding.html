<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store Onboarding | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Launching your storefront</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container" style="padding: 48px 0;">
      <section class="form-card reveal">
        <h1 class="page-title">Welcome to your storefront</h1>
        <p class="page-copy">Set up your store details and launch your premium presence in just a few steps.</p>
        <form id="vendorOnboardingForm">
          <div class="form-grid">
            <div class="form-group"><label for="storeName">Store Name</label><input id="storeName" type="text" placeholder="Your store name" /></div>
            <div class="form-group"><label for="storeCategory">Business Category</label><input id="storeCategory" type="text" placeholder="Fashion, Beauty, Wellness..." /></div>
          </div>
          <div class="form-group"><label for="storeDescription">Business Description</label><textarea id="storeDescription" rows="3" placeholder="Tell shoppers what makes your storefront special."></textarea></div>
          <div class="form-grid">
            <div class="form-group"><label for="storePhone">Phone Number</label><input id="storePhone" type="text" placeholder="+234 800 000 0000" /></div>
            <div class="form-group"><label for="storeWhatsapp">WhatsApp Number</label><input id="storeWhatsapp" type="text" placeholder="WhatsApp contact" /></div>
          </div>
          <div class="form-grid">
            <div class="form-group"><label for="storeEmail">Business Email</label><input id="storeEmail" type="email" placeholder="hello@yourstore.com" /></div>
            <div class="form-group"><label for="storeAddress">Business Address</label><input id="storeAddress" type="text" placeholder="City, neighborhood, or address" /></div>
          </div>
          <div class="form-grid">
            <div class="form-group"><label for="storeHours">Business Hours</label><input id="storeHours" type="text" placeholder="Mon-Sat 9:00 AM - 8:00 PM" /></div>
            <div class="form-group"><label for="storeSocial">Social Links</label><input id="storeSocial" type="text" placeholder="Instagram, TikTok, Facebook" /></div>
          </div>
          <div class="form-group"><label for="storeBanner">Banner URL</label><input id="storeBanner" type="text" placeholder="https://example.com/banner.jpg" /></div>
          <div class="form-group"><label for="storeLogo">Logo URL</label><input id="storeLogo" type="text" placeholder="https://example.com/logo.png" /></div>
          <button id="onboardingSaveBtn" class="btn btn-primary" type="submit">Save Store Details</button>
          <p class="muted" id="onboardingMessage" style="margin-top: 12px;"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
