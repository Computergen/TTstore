<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Loading TULA MARKET</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container" style="padding: 48px 0;">
      <section class="form-card reveal">
        <h1 class="page-title">Welcome Back</h1>
        <p class="page-copy">Access your customer, vendor, or admin dashboard.</p>
        <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••" /></div>
        <button class="btn btn-primary" type="button">Login</button>
        <p class="muted" style="margin-top: 10px;"><a href="register.html">Create account</a> • <a href="forgot-password.html">Forgot password?</a></p>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
