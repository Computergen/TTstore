<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Loading TULA MARKET</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container">
      <section class="page-top">
        <h1 class="page-title">Secure Checkout</h1>
        <p class="page-copy">Complete your purchase with a simple, premium checkout experience.</p>
      </section>
      <section class="grid grid-2 reveal">
        <article class="form-card">
          <h3>Customer Details</h3>
          <div class="form-group"><label>Name</label><input type="text" placeholder="Your name" /></div>
          <div class="form-group"><label>Email</label><input type="email" placeholder="Your email" /></div>
          <div class="form-group"><label>Address</label><textarea rows="3" placeholder="Delivery address"></textarea></div>
        </article>
        <article class="form-card">
          <h3>Payment & Summary</h3>
          <div class="form-group"><label>Payment Method</label><select><option>Card</option><option>Cash on Delivery</option></select></div>
          <p class="muted">Subtotal: $620</p>
          <p class="muted">Transaction Fee: $12</p>
          <p class="price">Total: $632</p>
          <button class="btn btn-primary" type="button">Place Order</button>
        </article>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
