<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Loading TULA MARKET</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container">
      <section class="page-top">
        <h1 class="page-title">Contact TULA'S TECH</h1>
        <p class="page-copy">Connect with the platform team for partnership, support, or marketplace inquiries.</p>
      </section>
      <section class="grid grid-2 reveal">
        <article class="form-card">
          <div class="form-group"><label>Name</label><input type="text" placeholder="Your name" /></div>
          <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com" /></div>
          <div class="form-group"><label>Message</label><textarea rows="5" placeholder="How can we help?"></textarea></div>
          <button class="btn btn-primary" type="button">Send Message</button>
        </article>
        <article class="glass-card">
          <h3>Support Channels</h3>
          <p class="muted">Email: hello@tulamarket.com</p>
          <p class="muted">Phone: +1 (555) 014-2288</p>
          <p class="muted">Hours: Mon-Fri • 9 AM to 6 PM</p>
        </article>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
