<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Loading TULA MARKET</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container" style="padding: 48px 0;">
      <section class="form-card reveal">
        <h1 class="page-title">Create Your Free Online Store</h1>
        <p class="page-copy">Join as a customer to shop or open a vendor storefront and start selling with a premium digital presence.</p>
        <div class="form-group"><label for="registerName">Full Name</label><input id="registerName" type="text" placeholder="Your full name" /></div>
        <div class="form-group"><label for="registerEmail">Email</label><input id="registerEmail" type="email" placeholder="you@example.com" /></div>
        <div class="form-group"><label for="registerPassword">Password</label><input id="registerPassword" type="password" placeholder="Create a password" /></div>
        <div class="pill-row">
          <button id="registerBtn" class="btn btn-primary" type="button" data-role="customer">Create Customer Account</button>
          <button id="registerVendorBtn" class="btn btn-secondary" type="button" data-role="vendor">Open Your Store</button>
        </div>
        <p class="muted" id="registerMessage" style="margin-top: 12px;"></p>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
