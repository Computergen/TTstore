<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | TULA MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Secure Admin Access</h3>
      </div>
    </div>

    <header class="site-header" data-header></header>

    <main class="container" style="padding: 48px 0;">
      <section class="form-card reveal">
        <h1 class="page-title">Admin Access</h1>
        <p class="page-copy">Only platform-authorized administrators can continue.</p>
        <div class="form-group"><label for="adminEmail">Admin Email</label><input id="adminEmail" type="email" placeholder="admin@tula.market" /></div>
        <div class="form-group"><label for="adminPassword">Password</label><input id="adminPassword" type="password" placeholder="••••••••" /></div>
        <button id="adminLoginBtn" class="btn btn-primary" type="button">Sign In</button>
        <p class="muted" id="adminMessage" style="margin-top: 12px;"></p>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <script src="../firebase/firebase-config.js"></script>
    <script src="../firebase/auth.js"></script>
    <script src="../firebase/firestore.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
